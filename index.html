<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Utility Tracker Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .tabs {
            display: flex;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow: hidden;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 20px;
            background: none;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #666;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .tab-content {
            display: none;
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            min-height: 500px;
        }

        .tab-content.active {
            display: block;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }

        .input-group input, .input-group select {
            width: 100%;
            padding: 15px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }

        .input-group input:focus, .input-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            width: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .records {
            max-height: 400px;
            overflow-y: auto;
            margin-top: 20px;
        }

        .record-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 4px solid #667eea;
        }

        .record-info h4 {
            margin-bottom: 5px;
            color: #333;
        }

        .record-amount {
            font-size: 18px;
            font-weight: bold;
            color: #667eea;
        }

        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .summary-card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-top: 4px solid #667eea;
        }

        .summary-value {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 5px;
        }

        .summary-label {
            color: #666;
            font-weight: 500;
        }

        .chart-container {
            position: relative;
            height: 400px;
            margin-top: 20px;
        }

        .employee-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .employee-id {
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
        }

        @media (max-width: 768px) {
            .tabs {
                flex-direction: column;
            }
            
            .record-item {
                flex-direction: column;
                text-align: center;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏠 Utility Tracker Pro</h1>
            <p>Track your daily utilities & expenses professionally</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('input')">📝 Add Entry</button>
            <button class="tab-btn" onclick="switchTab('history')">📊 History</button>
            <button class="tab-btn" onclick="switchTab('summary')">📈 Summary</button>
        </div>

        <!-- Input Tab -->
        <div id="input" class="tab-content active">
            <div class="employee-section">
                <div class="employee-id">👤 Employee ID: <span id="employeeId">EMP001</span></div>
                <small>Share this Employee ID with your employees</small>
            </div>
            
            <div class="input-group">
                <label>Category</label>
                <select id="category">
                    <option value="Electricity">⚡ Electricity</option>
                    <option value="Water">💧 Water</option>
                    <option value="Food">🍽️ Food</option>
                    <option value="Other Expenses">💰 Other Expenses</option>
                </select>
            </div>

            <div class="input-group">
                <label>Amount (₹)</label>
                <input type="number" id="amount" placeholder="Enter amount" step="0.01" required>
            </div>

            <div class="input-group">
                <label>Description</label>
                <input type="text" id="description" placeholder="Enter details (optional)">
            </div>

            <div class="input-group">
                <label>Closing Balance (₹)</label>
                <input type="number" id="closingBalance" placeholder="Enter closing balance" step="0.01">
            </div>

            <button class="btn" onclick="addEntry()">➕ Add Daily Entry</button>
        </div>

        <!-- History Tab -->
        <div id="history" class="tab-content">
            <div class="records" id="recordsList">
                <div style="text-align: center; padding: 40px; color: #666;">
                    📝 No records yet. Add entries from the first tab!
                </div>
            </div>
        </div>

        <!-- Summary Tab -->
        <div id="summary" class="tab-content">
            <div class="summary-cards">
                <div class="summary-card">
                    <div class="summary-value" id="totalExpenses">₹0</div>
                    <div class="summary-label">Total Expenses</div>
                </div>
                <div class="summary-card">
                    <div class="summary-value" id="finalBalance">₹0</div>
                    <div class="summary-label">Final Balance</div>
                </div>
                <div class="summary-card">
                    <div class="summary-value" id="totalEntries">0</div>
                    <div class="summary-label">Total Entries</div>
                </div>
            </div>
            
            <div class="chart-container">
                <canvas id="expensesChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        let records = JSON.parse(localStorage.getItem('utilityRecords')) || [];
        let employeeId = localStorage.getItem('employeeId') || 'EMP001';
        document.getElementById('employeeId').textContent = employeeId;

        // Initialize chart
        let ctx = document.getElementById('expensesChart').getContext('2d');
        let expensesChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: [],
                datasets: [{
                    data: [],
                    backgroundColor: ['#667eea', '#764ba2', '#f093fb', '#f5576c']
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: 'bottom'
                    }
                }
            }
        });

        function switchTab(tabName) {
            // Update tab buttons
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            // Update tab content
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            
            if (tabName === 'history') displayRecords();
            if (tabName === 'summary') updateSummary();
        }

        function addEntry() {
            const category = document.getElementById('category').value;
            const amount = parseFloat(document.getElementById('amount').value);
            const description = document.getElementById('description').value;
            const closingBalance = parseFloat(document.getElementById('closingBalance').value) || 0;

            if (!amount || amount <= 0) {
                alert('Please enter a valid amount');
                return;
            }

            const entry = {
                id: Date.now(),
                employeeId: employeeId,
                category: category,
                amount: amount,
                description: description,
                closingBalance: closingBalance,
                date: new Date().toLocaleString('en-IN', {
                    day: '2-digit',
                    month: '2-digit',
                    year: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                })
            };

            records.unshift(entry);
            localStorage.setItem('utilityRecords', JSON.stringify(records));
            
            // Reset form
            document.getElementById('amount').value = '';
            document.getElementById('description').value = '';
            document.getElementById('closingBalance').value = '';

            alert('✅ Entry added successfully!');
            updateSummary();
        }

        function displayRecords() {
            const recordsList = document.getElementById('recordsList');
            if (records.length === 0) {
                recordsList.innerHTML = '<div style="text-align: center; padding: 40px; color: #666;">📝 No records yet. Add entries from the first tab!</div>';
                return;
            }

            recordsList.innerHTML = records.map(record => `
                <div class="record-item">
                    <div class="record-info">
                        <h4>${record.category}</h4>
                        <small>${record.date} | ${record.description || 'No description'}</small>
                        <br><small>👤 ${record.employeeId}</small>
                    </div>
                    <div>
                        <div class="record-amount">₹${record.amount.toFixed(2)}</div>
                        ${record.closingBalance ? `<div style="font-size: 14px; color: #666;">Balance: ₹${record.closingBalance.toFixed(2)}</div>` : ''}
                    </div>
                </div>
            `).join('');
        }

        function updateSummary() {
            const totalExpenses = records.reduce((sum, record) => sum + record.amount, 0);
            const finalBalance = records[0]?.closingBalance || 0;
            const totalEntries = records.length;

            document.getElementById('totalExpenses').textContent = `₹${totalExpenses.toFixed(2)}`;
            document.getElementById('finalBalance').textContent = `₹${finalBalance.toFixed(2)}`;
            document.getElementById('totalEntries').textContent = totalEntries;

            // Update chart
            const categoryTotals = {};
            records.forEach(record => {
                categoryTotals[record.category] = (categoryTotals[record.category] || 0) + record.amount;
            });

            expensesChart.data.labels = Object.keys(categoryTotals);
            expensesChart.data.datasets[0].data = Object.values(categoryTotals);
            expensesChart.update();
        }

        // Initialize on load
        displayRecords();
        updateSummary();

        // Generate new Employee ID
        document.getElementById('employeeId').addEventListener('click', () => {
            employeeId = 'EMP' + Math.floor(Math.random() * 1000).toString().padStart(3, '0');
            localStorage.setItem('employeeId', employeeId);
            document.getElementById('employeeId').textContent = employeeId;
        });
    </script>
</body>
</html>
